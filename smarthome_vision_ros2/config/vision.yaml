smarthome_vision_node:
  ros__parameters:
    image_topic: "/image_raw"
    gimbal_mode_topic: "gimbal_mode"

    show_debug: false
    log_debug_result: true
    debug_view_scale: 1
    inference_backend: "openvino"
    openvino_device: "CPU"
    use_cuda_preprocess: false

    # Competition mode uses one detector only. Do not let lower-controller mode switch vision.
    use_mode_control: false
    use_test_mode: true
    test_mode: 1

    use_local_camera: true
    camera_device_id: 0
    camera_width: 640
    camera_height: 480
    camera_fps: 30

    camera_matrix: [
      480.076424, 0.000000, 324.641891,
      0.000000, 481.012310, 242.491443,
      0.000000, 0.000000, 1.000000
    ]
    dist_coeffs: [-0.046451, 0.085529, 0.001981, 0.006941, 0.000000]
    # Added to the final camera-frame pose before publishing: [x, y, z] in meters.
    pose_offset_xyz: [0.0, 0.0, 0.0]

    # Object class ids: red=0, yellow=1, green=2.
    # class_sizes are real width/height pairs in meters, in the same order.
    # Object pose now uses bbox center + these real sizes for distance estimation.
    # For near-round apples, set width and height to the same measured diameter.
    class_names: [0, 1, 2]
    class_sizes: [
      0.083, 0.073,
      0.060, 0.050,
      0.083, 0.073
    ]

    object_input_width: 640
    object_input_height: 640
    object_conf_threshold: 0.75
    object_score_threshold: 0.75
    # Multi-target selection: prefer red(class 0), then nearer z, then smaller lateral x/y.
    target_priority_class_id: 0
    target_prefer_nearest_z: true
    # OpenVINO uses .xml/.bin IR or .onnx. TensorRT still uses object_engine_path.
    object_model_path: ""
    object_engine_path: "/home/nvidia4/smarthome_2026/ws/src/smarthome_vision_ros2/assets/object.engine"
    object_output_keypoints: false
    object_model_class_ids: [0, 1, 2]
    object_pnp_class_ids: [0, 1]

    qr_input_width: 640
    qr_input_height: 640
    qr_conf_threshold: 0.25
    qr_score_threshold: 0.1
    # OpenVINO uses .xml/.bin IR or .onnx. TensorRT still uses qr_engine_path.
    qr_model_path: ""
    qr_engine_path: "/home/nvidia4/smarthome_2026/ws/src/smarthome_vision_ros2/assets/qrcode.engine"
    qr_output_keypoints: true
    qr_model_class_ids: [0, 1, 2, 3]

    qr_size: 0.060
